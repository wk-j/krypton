<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        width: 320px;
        margin: 0;
        padding: 12px;
        font: 13px/1.45 -apple-system, system-ui, sans-serif;
        background: #14151a;
        color: #e8e8ea;
      }
      h1 { font-size: 12px; letter-spacing: 0.08em; color: #f0b90b; margin: 0 0 8px; }
      label { display: block; font-size: 11px; color: #9aa0a6; margin: 8px 0 3px; }
      select, textarea {
        width: 100%;
        box-sizing: border-box;
        background: #1e1f26;
        color: #e8e8ea;
        border: 1px solid #2b2d36;
        border-radius: 6px;
        padding: 6px 8px;
        font: inherit;
      }
      textarea { resize: vertical; min-height: 48px; }
      #selection {
        max-height: 70px;
        overflow: auto;
        background: #1e1f26;
        border: 1px solid #2b2d36;
        border-radius: 6px;
        padding: 6px 8px;
        color: #b8bcc4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
      button {
        background: #f0b90b;
        color: #14151a;
        border: 0;
        border-radius: 6px;
        padding: 6px 10px;
        font: 12px/1 inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary { background: #2b2d36; color: #e8e8ea; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { margin-top: 10px; font-size: 11px; min-height: 14px; color: #9aa0a6; }
      #status.err { color: #f6465d; }
      #status.ok { color: #0ecb81; }
      #note-row { display: none; }
      #note-row.show { display: block; }
    </style>
  </head>
  <body>
    <h1>KRYPTON HARNESS</h1>
    <label for="lane">Lane</label>
    <select id="lane"></select>
    <label>Context</label>
    <div id="selection"></div>
    <div id="note-row">
      <label for="note">Note</label>
      <textarea id="note" placeholder="What do you want done with the selection?"></textarea>
      <div class="actions"><button id="send-custom">Send</button></div>
    </div>
    <label>Action</label>
    <div class="actions" id="action-list"></div>
    <div id="status"></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
