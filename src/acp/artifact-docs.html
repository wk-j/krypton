<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--DOCS_TITLE--></title>
<!--
  Docs browser shell (spec 171). Server-rendered full page per file.
  The Rust backend (hook_server.rs) reads this file via include_str! and
  replaces three placeholder comments by global string substitution. The
  placeholder tokens are intentionally NOT written literally in this comment
  (a literal would terminate this block early and also be replaced) — they are
  the DOCS_TITLE comment (in <title> and the header subtitle), the DOCS_TREE
  comment (inside nav.tree-pane), and the DOCS_CONTENT comment (inside
  article.doc). CONTENT is injected last; it is raw comrak GFM output.

  TREE HTML class contract emitted by the backend (style these, do not rename):
    ul.tree
    li.tree-group        > .tree-group__label  (one per harness root: "hm-1 · /abs/cwd")
    li.tree-dir          > details[open] > summary   (collapsible folder)
    li.tree-file         > a (href to /doc; a.is-active = current file)
-->
<style>
  :root {
    --bg: #17191d; --fg: #e8eaed; --text: #b7bdc6; --muted: #707a8a; --border: #2f353d;
    --accent: #fcd535; --code-fg: #f0b90b; --card: #21242a; --code-bg: #1d1f24; color-scheme: dark;
    --sans: 'BinanceNova', 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'BinancePlex', 'JetBrains Mono', 'SF Mono', Menlo, ui-monospace, monospace;
    --tree-w: min(280px, 36vw);
    --header-h: 48px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa; --fg: #0d1117; --text: #474d57; --muted: #707a8a; --border: #eaecef;
      --accent: #c99400; --code-fg: #9a6a00; --card: #ffffff; --code-bg: #f5f5f5; color-scheme: light;
    }
  }
  *, *::before, *::after { box-sizing: border-box; }
  /* thin, subtle scrollbars that match the dark theme (no chunky native bar) */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  ::-webkit-scrollbar-corner { background: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--sans); font-size: 14px; line-height: 1.5;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .header {
    flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    height: var(--header-h); padding: 0 16px;
    background: var(--card); border-bottom: 1px solid var(--border);
  }
  .header__brand { font-size: 13px; font-weight: 700; letter-spacing: .02em; }
  .header__title {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .layout {
    flex: 1; display: flex; min-height: 0; overflow: hidden;
    width: 100%; max-width: 1180px; margin: 0 auto;
  }
  .tree-pane {
    flex-shrink: 0; width: var(--tree-w); overflow: auto;
    background: rgba(30, 35, 41, .45); border-right: 1px solid var(--border);
    padding: 12px 0 24px;
  }
  @media (prefers-color-scheme: light) {
    .tree-pane { background: rgba(234, 236, 239, .35); }
  }
  .content-pane {
    flex: 1; overflow: auto; padding: 24px 32px 48px; min-width: 0;
  }
  @media (max-width: 720px) {
    .layout { flex-direction: column; }
    .tree-pane {
      width: 100%; max-height: 40vh; border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .content-pane { padding: 16px 16px 32px; }
  }

  /* file tree */
  ul.tree { list-style: none; margin: 0; padding: 0 8px 0 12px; }
  ul.tree ul { list-style: none; margin: 0; padding: 0 0 0 14px; }
  li.tree-group { margin: 0 0 10px; }
  li.tree-group:last-child { margin-bottom: 0; }
  a.tree-group__label {
    display: block; font-family: var(--mono); font-size: 12px; color: var(--muted);
    padding: 6px 8px 4px; letter-spacing: .01em;
    text-decoration: none; border-radius: 4px;
  }
  a.tree-group__label:hover { background: rgba(252, 213, 53, .06); color: var(--accent); }
  a.tree-group__label.is-active { color: var(--accent); }
  li.tree-dir { margin: 1px 0; }
  li.tree-dir > details > summary {
    cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 4px;
    list-style: none; user-select: none; display: flex; align-items: center;
  }
  li.tree-dir > details > summary::-webkit-details-marker { display: none; }
  li.tree-dir > details > summary::before {
    content: "▸"; flex-shrink: 0; width: 16px; font-size: 12px;
    color: var(--muted); transition: transform .12s ease;
  }
  li.tree-dir > details[open] > summary::before { transform: rotate(90deg); }
  li.tree-dir > details > summary:hover { background: rgba(252, 213, 53, .06); }
  li.tree-dir > details > summary > a {
    flex: 1; color: var(--fg); text-decoration: none; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  li.tree-dir > details > summary > a:hover { color: var(--accent); }
  li.tree-dir > details > summary > a.is-active { color: var(--accent); font-weight: 600; }

  /* file-browser listing (right pane) */
  nav.crumbs {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    margin: 0 0 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  }
  nav.crumbs a { color: var(--muted); text-decoration: none; }
  nav.crumbs a:hover { color: var(--accent); }
  nav.crumbs a:last-child { color: var(--fg); }
  nav.crumbs .crumbs__sep { color: var(--border); }
  ul.browser { list-style: none; margin: 0; padding: 0; }
  ul.browser li.browser__item { margin: 0; }
  ul.browser li.browser__item > a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 6px; text-decoration: none;
    color: var(--fg); font-size: 15px; border: 1px solid transparent;
  }
  ul.browser li.browser__item > a:hover {
    background: rgba(252, 213, 53, .06); border-color: var(--border);
  }
  ul.browser .browser__icon {
    flex-shrink: 0; width: 18px; text-align: center; color: var(--muted); font-size: 15px;
  }
  ul.browser .browser__name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  ul.browser .browser__date {
    margin-left: auto; flex-shrink: 0; padding-left: 16px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  @media (max-width: 480px) { ul.browser .browser__date { display: none; } }
  ul.browser li.browser__item--dir .browser__icon,
  ul.browser li.browser__item--up .browser__icon { color: var(--accent); }
  ul.browser li.browser__item--dir > a:hover .browser__name,
  ul.browser li.browser__item--file > a:hover .browser__name { color: var(--accent); }

  /* comrak GFM content */
  article.doc { max-width: 820px; margin-inline: auto; font-size: 15px; line-height: 1.65; }
  article.doc > :first-child { margin-top: 0; }
  article.doc > :last-child { margin-bottom: 0; }
  article.doc h1, article.doc h2, article.doc h3,
  article.doc h4, article.doc h5, article.doc h6 {
    line-height: 1.3; font-weight: 700; margin: 1.4em 0 .6em; color: var(--fg);
  }
  article.doc h1 { font-size: 1.75em; margin-top: 0; color: var(--accent); }
  article.doc h2 { font-size: 1.35em; padding-bottom: .3em;
                   border-bottom: 1px solid var(--border); }
  article.doc h3 { font-size: 1.15em; color: var(--accent); }
  article.doc h4 { font-size: 1em; }
  article.doc h5, article.doc h6 { font-size: .9em; color: var(--muted); }
  article.doc p { margin: .75em 0; }
  article.doc strong, article.doc b { color: var(--fg); font-weight: 700; }
  article.doc a { color: var(--accent); text-decoration: underline;
                  text-underline-offset: 2px; }
  article.doc a:hover { opacity: .85; }
  article.doc ul, article.doc ol { margin: .75em 0; padding-left: 1.5em; }
  article.doc li { margin: .25em 0; }
  article.doc li > input[type="checkbox"] {
    margin-right: .4em; accent-color: var(--accent); vertical-align: middle;
  }
  article.doc li:has(> input[type="checkbox"]) { list-style: none; margin-left: -1.5em; }
  article.doc code {
    font-family: var(--mono); font-size: .88em; color: var(--code-fg);
    background: var(--code-bg); padding: .15em .35em; border-radius: 3px;
  }
  article.doc pre {
    font-family: var(--mono); font-size: 12px; line-height: 1.45;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; overflow-x: auto; margin: 1em 0;
  }
  article.doc pre code { background: none; padding: 0; font-size: inherit; color: var(--fg); }
  article.doc blockquote {
    margin: 1em 0; padding: 10px 14px;
    background: rgba(112, 122, 138, .08); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
  }
  article.doc blockquote p { margin: .4em 0; }
  article.doc table {
    width: 100%; border-collapse: collapse; margin: 1em 0;
    font-size: 13px; border: 1px solid var(--border);
  }
  article.doc th, article.doc td {
    padding: 8px 12px; border: 1px solid var(--border); text-align: left;
  }
  article.doc th { background: var(--code-bg); font-weight: 600; }
  article.doc tr:nth-child(even) td { background: rgba(112, 122, 138, .04); }
  article.doc dl.frontmatter {
    display: grid; grid-template-columns: auto 1fr; gap: 4px 16px;
    margin: 0 0 1.5em; padding: 14px 16px; font-size: 13px;
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px;
  }
  article.doc dl.frontmatter dt {
    font-family: var(--mono); color: var(--muted); font-weight: 600;
    white-space: nowrap;
  }
  article.doc dl.frontmatter dd { margin: 0; color: var(--fg); word-break: break-word; }
  article.doc img { max-width: 100%; height: auto; border-radius: 4px; }
  article.doc hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  article.doc .welcome {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    padding: 32px 0; line-height: 1.6;
  }
</style>
</head>
<body>
<header class="header">
  <span class="header__brand">Docs browser</span>
  <span class="header__title"><!--DOCS_TITLE--></span>
</header>
<div class="layout">
  <nav class="tree-pane"><!--DOCS_TREE--></nav>
  <div class="content-pane">
    <article class="doc"><!--DOCS_CONTENT--></article>
  </div>
</div>
<script>
  // Localise the file-browser modified dates. The server renders a UTC
  // `YYYY-MM-DD HH:MM` fallback (shown if JS is off) plus a data-ts epoch-ms;
  // here we replace the text with the viewer's locale date.
  for (const el of document.querySelectorAll('time.browser__date[data-ts]')) {
    const ms = Number(el.getAttribute('data-ts'));
    if (!Number.isFinite(ms)) continue;
    const d = new Date(ms);
    el.dateTime = d.toISOString();
    el.textContent = d.toLocaleDateString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
    });
    el.title = d.toLocaleString();
  }
</script>
<script>
  // Preserve the folder-nav (sidebar) scroll position across the full-page
  // reloads that index navigation triggers (spec 171 decision #9 = a fresh
  // full page per folder click). Each click is a new URL, so the browser does
  // NOT restore scroll (it only does that on back/forward) and the sidebar
  // snaps back to the top — forcing the reader to re-scroll to where they were
  // in a deep tree. We stash the sidebar scrollTop per harness and restore it
  // on load. Index-only; the single-file reader has no sidebar.
  (function () {
    if (location.pathname !== '/docs') return;
    var pane = document.querySelector('nav.tree-pane');
    if (!pane) return;
    var KEY = 'kds:' + (new URLSearchParams(location.search).get('harness') || '');
    try {
      var y = sessionStorage.getItem(KEY);
      if (y != null) pane.scrollTop = +y;
    } catch (e) {}
    var raf = 0;
    pane.addEventListener('scroll', function () {
      if (raf) return;
      raf = requestAnimationFrame(function () {
        raf = 0;
        try { sessionStorage.setItem(KEY, String(pane.scrollTop)); } catch (e) {}
      });
    }, { passive: true });
  })();
</script>
<script>
  // spec 172 — docs-browser inline feedback overlay. A mini element/text picker:
  // hover-highlight + click-to-anchor a passage + comment, POSTed to the harness,
  // which routes it to its active lane as a system turn. Self-gates to the
  // single-file reader (`/doc`); the `/docs` index never arms it. Unlike the
  // artifact overlay (spec 149) a doc has no owning lane and no token — it is a
  // repo file keyed by harness+path (read from the query, same-origin POST), and
  // the page is comrak OUTPUT, so the anchor is the QUOTED TEXT + heading trail,
  // never a DOM selector (the lane edits the source `.md`, not this DOM).
  (function () {
    if (location.pathname !== "/doc") return;
    var qp = new URLSearchParams(location.search);
    var HARNESS = qp.get("harness") || "";
    var DOCPATH = qp.get("path") || "";
    if (!HARNESS || !DOCPATH) return;

    var FEED = "/doc-feedback?harness=" + encodeURIComponent(HARNESS) + "&path=" + encodeURIComponent(DOCPATH);
    var STATE = "/doc-state?harness=" + encodeURIComponent(HARNESS) + "&path=" + encodeURIComponent(DOCPATH);
    var SKEY = "kdf:" + HARNESS + ":" + DOCPATH;   // harness+path-scoped sessionStorage
    var BODY_MAX = 4000, QUOTE_MAX = 2000;

    // ── persisted state ──────────────────────────────────────────────────
    var pins = [];            // {id,pinNumber,body,quote,headingPath,createdAt,sent,drifted}
    var pinSeq = 0;
    var draft = null;
    var batchId = null;
    try {
      var saved = JSON.parse(sessionStorage.getItem(SKEY) || "null");
      if (saved) {
        pins = (saved.pins || []).filter(function (p) { return !p.sent; });
        pinSeq = saved.pinSeq || pins.length;
        draft = saved.draft || null;
        batchId = saved.batchId || null;
      }
    } catch (e) {}
    function persist() {
      try {
        sessionStorage.setItem(SKEY, JSON.stringify({ pins: pins, pinSeq: pinSeq, draft: draft, batchId: batchId }));
      } catch (e) {}
    }

    var armed = false, disabled = false, cycleIdx = -1;
    var lastHash = null, pendingReload = null;
    var SCOPE = document.querySelector("article.doc") || document.body;

    // ── self-injected DOM (theme-token styled, fixed, high z) ──────────────
    var ROOT = document.createElement("div");
    ROOT.setAttribute("data-kdf", "root");
    ROOT.innerHTML =
      '<style>' +
      '[data-kdf]{font-family:var(--mono,monospace);box-sizing:border-box}' +
      '#kdf-pill{position:fixed;right:12px;bottom:12px;z-index:2147483646;' +
        'background:var(--card,#21242a);color:var(--fg,#eaecef);border:1px solid var(--border,#2f353d);' +
        'border-radius:6px;padding:6px 10px;font-size:12px;line-height:1.4;cursor:pointer;' +
        'max-width:280px;box-shadow:0 2px 12px rgba(0,0,0,.4)}' +
      '#kdf-pill b{color:var(--accent,#fcd535)}' +
      '#kdf-pill .kdf-sub{color:var(--muted,#707a8a);display:block;margin-top:2px;font-size:11px}' +
      '#kdf-hi{position:fixed;z-index:2147483645;pointer-events:none;border:2px solid var(--accent,#fcd535);' +
        'background:rgba(252,213,53,.12);border-radius:3px;display:none}' +
      '#kdf-box{position:fixed;right:12px;bottom:52px;z-index:2147483647;width:300px;' +
        'background:var(--card,#21242a);color:var(--fg,#eaecef);border:1px solid var(--accent,#fcd535);' +
        'border-radius:6px;padding:10px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}' +
      '#kdf-box .kdf-tgt{color:var(--muted,#707a8a);font-size:11px;margin-bottom:6px;' +
        'white-space:nowrap;overflow:hidden;text-overflow:ellipsis}' +
      '#kdf-box textarea{width:100%;box-sizing:border-box;min-height:64px;resize:vertical;' +
        'font:inherit;font-size:12px;background:var(--bg,#17191d);color:var(--fg,#eaecef);' +
        'border:1px solid var(--border,#2f353d);border-radius:4px;padding:6px}' +
      '#kdf-box .kdf-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}' +
      '#kdf-box .kdf-keys{color:var(--muted,#707a8a);font-size:10px}' +
      '#kdf-box button,#kdf-pill button{font:inherit;font-size:11px;cursor:pointer;' +
        'background:transparent;border:1px solid var(--border,#2f353d);color:var(--accent,#fcd535);' +
        'border-radius:4px;padding:3px 9px;margin-left:4px}' +
      '</style>' +
      '<div id="kdf-hi"></div>' +
      '<div id="kdf-pill"></div>' +
      '<div id="kdf-box">' +
        '<div class="kdf-tgt" id="kdf-tgt"></div>' +
        '<textarea id="kdf-text" placeholder="describe the change…"></textarea>' +
        '<div class="kdf-row"><span class="kdf-keys">⌘↵ save · esc cancel</span>' +
          '<span><button id="kdf-cancel" type="button">cancel</button>' +
          '<button id="kdf-save" type="button">save</button></span></div>' +
      '</div>';
    document.body.appendChild(ROOT);
    var pillEl = ROOT.querySelector("#kdf-pill");
    var hiEl = ROOT.querySelector("#kdf-hi");
    var boxEl = ROOT.querySelector("#kdf-box");
    var tgtEl = ROOT.querySelector("#kdf-tgt");
    var textEl = ROOT.querySelector("#kdf-text");

    function cap(s, n) { s = s == null ? "" : String(s); return s.length > n ? s.slice(0, n) : s; }
    function inOverlay(el) { return !!(el && el.closest && el.closest("[data-kdf]")); }
    function inDoc(el) { return !!(el && SCOPE.contains(el)); }

    // ── heading trail: nearest preceding heading + its higher-level ancestors ──
    function headText(h) { return cap((h.textContent || "").trim(), 120); }
    function headingPathFor(el) {
      var heads = Array.prototype.slice.call(SCOPE.querySelectorAll("h1,h2,h3,h4,h5,h6"));
      var preceding = heads.filter(function (h) {
        return h === el || (el.compareDocumentPosition(h) & Node.DOCUMENT_POSITION_PRECEDING);
      });
      if (!preceding.length) return [];
      var idx = preceding.length - 1;
      var level = +preceding[idx].tagName.slice(1);
      var path = [headText(preceding[idx])];
      for (var j = idx - 1; j >= 0 && level > 1; j--) {
        var lv = +preceding[j].tagName.slice(1);
        if (lv < level) { path.unshift(headText(preceding[j])); level = lv; }
      }
      return path;
    }

    // ── pick the most specific (shortest-text) element containing a quote ──
    function resolveByQuote(q) {
      if (!q) return null;
      q = String(q).trim();
      if (!q) return null;
      var els = SCOPE.querySelectorAll("p,li,h1,h2,h3,h4,h5,h6,td,th,blockquote,pre,code,a,strong,em");
      var best = null, bestLen = Infinity;
      for (var i = 0; i < els.length; i++) {
        var t = els[i].textContent || "";
        if (t.indexOf(q) !== -1 && t.length < bestLen) { best = els[i]; bestLen = t.length; }
      }
      return best;
    }

    function highlight(el) {
      if (!el) { hiEl.style.display = "none"; return; }
      var r = el.getBoundingClientRect();
      hiEl.style.left = r.left + "px"; hiEl.style.top = r.top + "px";
      hiEl.style.width = r.width + "px"; hiEl.style.height = r.height + "px";
      hiEl.style.display = "block";
    }
    function flashHighlight(el) {
      highlight(el);
      window.clearTimeout(flashHighlight._t);
      flashHighlight._t = window.setTimeout(function () { if (!armed) hiEl.style.display = "none"; }, 1200);
    }

    var flashMsg = null;
    function flash(msg) { flashMsg = msg; renderPill(); window.clearTimeout(flash._t); flash._t = window.setTimeout(function () { flashMsg = null; renderPill(); }, 2200); }

    function renderPill() {
      var unsent = pins.filter(function (p) { return !p.sent; }).length;
      var drifted = pins.filter(function (p) { return p.drifted; }).length;
      var main, sub;
      if (disabled) { main = "✦ doc no longer available"; sub = "the file or harness is gone"; }
      else if (armed) { main = "✦ click a passage"; sub = "esc to cancel"; }
      else {
        main = "✦ doc comments (" + pins.length + ")";
        var bits = ["c add"];
        if (unsent > 0) bits.push("s send " + unsent);
        if (pins.length > 0) bits.push("j/k cycle");
        sub = bits.join(" · ");
      }
      if (flashMsg) sub = flashMsg;
      if (drifted > 0 && !flashMsg) sub += " · " + drifted + " drifted";
      pillEl.innerHTML = "<b>" + main + "</b><span class='kdf-sub'>" + sub + "</span>";
    }

    function arm() { if (disabled) return; armed = true; renderPill(); }
    function disarm() { armed = false; hiEl.style.display = "none"; renderPill(); maybeDeferredReload(); }

    function onMove(e) {
      if (!armed) return;
      var el = document.elementFromPoint(e.clientX, e.clientY);
      if (!el || inOverlay(el) || !inDoc(el)) { hiEl.style.display = "none"; return; }
      highlight(el);
    }
    function onClick(e) {
      if (!armed) return;
      var el = document.elementFromPoint(e.clientX, e.clientY);
      if (!el || inOverlay(el) || !inDoc(el)) return;
      e.preventDefault(); e.stopPropagation();
      armed = false;
      var sel = "";
      try { sel = String(window.getSelection ? window.getSelection() : "").trim(); } catch (x) {}
      var quote = sel || (el.textContent || "").trim();
      draft = { quote: cap(quote, QUOTE_MAX), headingPath: headingPathFor(el), body: "" };
      openComposer();
    }

    function openComposer() {
      if (!draft) return;
      var head = (draft.headingPath || []).join(" › ");
      tgtEl.textContent = (head ? head + "  " : "") + (draft.quote ? '“' + cap(draft.quote, 48) + '”' : "");
      textEl.value = draft.body || "";
      boxEl.style.display = "block";
      hiEl.style.display = "none";
      var el = resolveByQuote(draft.quote); if (el) highlight(el);
      renderPill();
      textEl.focus();
    }
    function closeComposer() { boxEl.style.display = "none"; renderPill(); }
    function saveComposer() {
      if (!draft) { closeComposer(); return; }
      var body = cap(textEl.value.trim(), BODY_MAX);
      if (!body) { flash("comment is empty"); return; }
      pinSeq += 1;
      pins.push({
        id: "d-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8),
        pinNumber: pinSeq, body: body, quote: draft.quote, headingPath: draft.headingPath,
        createdAt: Date.now(), sent: false, drifted: false
      });
      draft = null; persist(); closeComposer(); maybeDeferredReload();
    }
    function cancelComposer() { draft = null; persist(); closeComposer(); hiEl.style.display = "none"; maybeDeferredReload(); }

    // ── send the unsent batch (idempotent on batchId) ──────────────────────
    function sendBatch() {
      if (disabled) return;
      var unsent = pins.filter(function (p) { return !p.sent && !p.drifted; });
      if (!unsent.length) { flash("nothing to send"); return; }
      if (!batchId) batchId = "b-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      persist();
      var payload = {
        batchId: batchId,
        comments: unsent.map(function (p) {
          return { id: p.id, pinNumber: p.pinNumber, body: p.body, quote: p.quote, headingPath: p.headingPath, createdAt: p.createdAt };
        })
      };
      flash("sending…");
      fetch(FEED, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
        .then(function (res) {
          if (res.ok) {
            unsent.forEach(function (p) { p.sent = true; });
            batchId = null; persist();
            flash("queued " + payload.comments.length + " ✓");
          } else if (res.status === 409) { flash("no active lane — open one in this harness"); }
          else if (res.status === 404) { disabled = true; renderPill(); flash("doc no longer available"); }
          else if (res.status === 413) { flash("too large — trim a comment"); }
          else if (res.status === 503) { flash("queued — retrying, press s"); }
          else { flash("send failed (" + res.status + ")"); }
        })
        .catch(function () { flash("offline — press s to retry"); });
    }

    function cyclePins(dir) {
      if (!pins.length) return;
      cycleIdx = (cycleIdx + dir + pins.length) % pins.length;
      var pin = pins[cycleIdx];
      var el = resolveByQuote(pin.quote);
      if (el) { el.scrollIntoView({ block: "center", behavior: "smooth" }); flashHighlight(el); }
      flash("pin #" + pin.pinNumber + ": " + cap(pin.body, 40));
    }

    // ── live-reload poll (hash change → reload, deferred while composing) ───
    function composing() { return boxEl.style.display === "block" || armed; }
    function maybeDeferredReload() { if (pendingReload && !composing()) { location.reload(); } }
    function poll() {
      if (disabled) return;
      fetch(STATE, { cache: "no-store" }).then(function (res) {
        if (res.status === 404) { disabled = true; renderPill(); return; }
        if (!res.ok) return;
        return res.json();
      }).then(function (st) {
        if (!st || !st.hash) return;
        if (lastHash === null) { lastHash = st.hash; return; }
        if (st.hash !== lastHash) {
          lastHash = st.hash; pendingReload = st.hash;
          if (!composing()) location.reload();
        }
      }).catch(function () { /* server gone — stop silently; manual refresh works */ });
    }

    // reconcile loaded pins against the current DOM (drift = quote text gone)
    pins.forEach(function (p) { p.drifted = !resolveByQuote(p.quote); });
    if (draft) openComposer();

    document.addEventListener("mousemove", onMove, true);
    document.addEventListener("click", onClick, true);
    pillEl.addEventListener("click", function () { if (disabled) return; if (armed) disarm(); else arm(); });
    ROOT.querySelector("#kdf-save").addEventListener("click", saveComposer);
    ROOT.querySelector("#kdf-cancel").addEventListener("click", cancelComposer);
    textEl.addEventListener("input", function () { if (draft) { draft.body = textEl.value; persist(); } });
    document.addEventListener("keydown", function (e) {
      if (boxEl.style.display === "block") {
        if (e.key === "Escape") { e.preventDefault(); cancelComposer(); }
        else if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveComposer(); }
        return;
      }
      var t = e.target;
      if (t && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName) || (t && t.isContentEditable)) return;
      if (e.key === "Escape" && armed) { e.preventDefault(); disarm(); }
      else if (e.key === "c" && !e.metaKey && !e.ctrlKey && !e.altKey) { e.preventDefault(); arm(); }
      else if (e.key === "s" && !e.metaKey && !e.ctrlKey && !e.altKey) { e.preventDefault(); sendBatch(); }
      else if (e.key === "j") { e.preventDefault(); cyclePins(1); }
      else if (e.key === "k") { e.preventDefault(); cyclePins(-1); }
    }, true);
    window.addEventListener("scroll", function () { if (armed) hiEl.style.display = "none"; }, true);

    renderPill();
    poll();
    setInterval(poll, 2500);
  })();
</script>
</body>
</html>
