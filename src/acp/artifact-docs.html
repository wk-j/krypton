<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--DOCS_TITLE--></title>
<!--
  Docs browser shell (spec 171). Server-rendered full page per file.
  The Rust backend (hook_server.rs) reads this file via include_str! and
  replaces three placeholder comments by global string substitution. The
  placeholder tokens are intentionally NOT written literally in this comment
  (a literal would terminate this block early and also be replaced) — they are
  the DOCS_TITLE comment (in <title> and the header subtitle), the DOCS_TREE
  comment (inside nav.tree-pane), and the DOCS_CONTENT comment (inside
  article.doc). CONTENT is injected last; it is raw comrak GFM output.

  TREE HTML class contract emitted by the backend (style these, do not rename):
    ul.tree
    li.tree-group        > .tree-group__label  (one per harness root: "hm-1 · /abs/cwd")
    li.tree-dir          > details[open] > summary   (collapsible folder)
    li.tree-file         > a (href to /doc; a.is-active = current file)
-->
<style>
  :root {
    --bg: #17191d; --fg: #e8eaed; --text: #b7bdc6; --muted: #707a8a; --border: #2f353d;
    --accent: #fcd535; --code-fg: #f0b90b; --card: #21242a; --code-bg: #1d1f24; color-scheme: dark;
    --sans: 'BinanceNova', 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'BinancePlex', 'JetBrains Mono', 'SF Mono', Menlo, ui-monospace, monospace;
    --tree-w: min(280px, 36vw);
    --header-h: 48px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa; --fg: #0d1117; --text: #474d57; --muted: #707a8a; --border: #eaecef;
      --accent: #c99400; --code-fg: #9a6a00; --card: #ffffff; --code-bg: #f5f5f5; color-scheme: light;
    }
  }
  *, *::before, *::after { box-sizing: border-box; }
  /* thin, subtle scrollbars that match the dark theme (no chunky native bar) */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  ::-webkit-scrollbar-corner { background: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--sans); font-size: 14px; line-height: 1.5;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  .header {
    flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    height: var(--header-h); padding: 0 16px;
    background: var(--card); border-bottom: 1px solid var(--border);
  }
  .header__brand { font-size: 13px; font-weight: 700; letter-spacing: .02em; }
  .header__title {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .layout {
    flex: 1; display: flex; min-height: 0; overflow: hidden;
    width: 100%; max-width: 1180px; margin: 0 auto;
  }
  .tree-pane {
    flex-shrink: 0; width: var(--tree-w); overflow: auto;
    background: rgba(30, 35, 41, .45); border-right: 1px solid var(--border);
    padding: 12px 0 24px;
  }
  @media (prefers-color-scheme: light) {
    .tree-pane { background: rgba(234, 236, 239, .35); }
  }
  .content-pane {
    flex: 1; overflow: auto; padding: 24px 32px 48px; min-width: 0;
  }
  @media (max-width: 720px) {
    .layout { flex-direction: column; }
    .tree-pane {
      width: 100%; max-height: 40vh; border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .content-pane { padding: 16px 16px 32px; }
  }

  /* file tree */
  ul.tree { list-style: none; margin: 0; padding: 0 8px 0 12px; }
  ul.tree ul { list-style: none; margin: 0; padding: 0 0 0 14px; }
  li.tree-group { margin: 0 0 10px; }
  li.tree-group:last-child { margin-bottom: 0; }
  a.tree-group__label {
    display: block; font-family: var(--mono); font-size: 12px; color: var(--muted);
    padding: 6px 8px 4px; letter-spacing: .01em;
    text-decoration: none; border-radius: 4px;
  }
  a.tree-group__label:hover { background: rgba(252, 213, 53, .06); color: var(--accent); }
  a.tree-group__label.is-active { color: var(--accent); }
  li.tree-dir { margin: 1px 0; }
  li.tree-dir > details > summary {
    cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 4px;
    list-style: none; user-select: none; display: flex; align-items: center;
  }
  li.tree-dir > details > summary::-webkit-details-marker { display: none; }
  li.tree-dir > details > summary::before {
    content: "▸"; flex-shrink: 0; width: 16px; font-size: 12px;
    color: var(--muted); transition: transform .12s ease;
  }
  li.tree-dir > details[open] > summary::before { transform: rotate(90deg); }
  li.tree-dir > details > summary:hover { background: rgba(252, 213, 53, .06); }
  li.tree-dir > details > summary > a {
    flex: 1; color: var(--fg); text-decoration: none; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  li.tree-dir > details > summary > a:hover { color: var(--accent); }
  li.tree-dir > details > summary > a.is-active { color: var(--accent); font-weight: 600; }

  /* file-browser listing (right pane) */
  nav.crumbs {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    margin: 0 0 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  }
  nav.crumbs a { color: var(--muted); text-decoration: none; }
  nav.crumbs a:hover { color: var(--accent); }
  nav.crumbs a:last-child { color: var(--fg); }
  nav.crumbs .crumbs__sep { color: var(--border); }
  ul.browser { list-style: none; margin: 0; padding: 0; }
  ul.browser li.browser__item { margin: 0; }
  ul.browser li.browser__item > a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 6px; text-decoration: none;
    color: var(--fg); font-size: 15px; border: 1px solid transparent;
  }
  ul.browser li.browser__item > a:hover {
    background: rgba(252, 213, 53, .06); border-color: var(--border);
  }
  ul.browser .browser__icon {
    flex-shrink: 0; width: 18px; text-align: center; color: var(--muted); font-size: 15px;
  }
  ul.browser .browser__name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  ul.browser .browser__date {
    margin-left: auto; flex-shrink: 0; padding-left: 16px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  @media (max-width: 480px) { ul.browser .browser__date { display: none; } }
  ul.browser li.browser__item--dir .browser__icon,
  ul.browser li.browser__item--up .browser__icon { color: var(--accent); }
  ul.browser li.browser__item--dir > a:hover .browser__name,
  ul.browser li.browser__item--file > a:hover .browser__name { color: var(--accent); }

  /* comrak GFM content */
  article.doc { max-width: 820px; margin-inline: auto; font-size: 15px; line-height: 1.65; }
  article.doc > :first-child { margin-top: 0; }
  article.doc > :last-child { margin-bottom: 0; }
  article.doc h1, article.doc h2, article.doc h3,
  article.doc h4, article.doc h5, article.doc h6 {
    line-height: 1.3; font-weight: 700; margin: 1.4em 0 .6em; color: var(--fg);
  }
  article.doc h1 { font-size: 1.75em; margin-top: 0; color: var(--accent); }
  article.doc h2 { font-size: 1.35em; padding-bottom: .3em;
                   border-bottom: 1px solid var(--border); }
  article.doc h3 { font-size: 1.15em; color: var(--accent); }
  article.doc h4 { font-size: 1em; }
  article.doc h5, article.doc h6 { font-size: .9em; color: var(--muted); }
  article.doc p { margin: .75em 0; }
  article.doc strong, article.doc b { color: var(--fg); font-weight: 700; }
  article.doc a { color: var(--accent); text-decoration: underline;
                  text-underline-offset: 2px; }
  article.doc a:hover { opacity: .85; }
  article.doc ul, article.doc ol { margin: .75em 0; padding-left: 1.5em; }
  article.doc li { margin: .25em 0; }
  article.doc li > input[type="checkbox"] {
    margin-right: .4em; accent-color: var(--accent); vertical-align: middle;
  }
  article.doc li:has(> input[type="checkbox"]) { list-style: none; margin-left: -1.5em; }
  article.doc code {
    font-family: var(--mono); font-size: .88em; color: var(--code-fg);
    background: var(--code-bg); padding: .15em .35em; border-radius: 3px;
  }
  article.doc pre {
    font-family: var(--mono); font-size: 12px; line-height: 1.45;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; overflow-x: auto; margin: 1em 0;
  }
  article.doc pre code { background: none; padding: 0; font-size: inherit; color: var(--fg); }
  article.doc blockquote {
    margin: 1em 0; padding: 10px 14px;
    background: rgba(112, 122, 138, .08); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
  }
  article.doc blockquote p { margin: .4em 0; }
  article.doc table {
    width: 100%; border-collapse: collapse; margin: 1em 0;
    font-size: 13px; border: 1px solid var(--border);
  }
  article.doc th, article.doc td {
    padding: 8px 12px; border: 1px solid var(--border); text-align: left;
  }
  article.doc th { background: var(--code-bg); font-weight: 600; }
  article.doc tr:nth-child(even) td { background: rgba(112, 122, 138, .04); }
  article.doc dl.frontmatter {
    display: grid; grid-template-columns: auto 1fr; gap: 4px 16px;
    margin: 0 0 1.5em; padding: 14px 16px; font-size: 13px;
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px;
  }
  article.doc dl.frontmatter dt {
    font-family: var(--mono); color: var(--muted); font-weight: 600;
    white-space: nowrap;
  }
  article.doc dl.frontmatter dd { margin: 0; color: var(--fg); word-break: break-word; }
  article.doc img { max-width: 100%; height: auto; border-radius: 4px; }
  article.doc hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  article.doc .welcome {
    font-family: var(--mono); font-size: 13px; color: var(--muted);
    padding: 32px 0; line-height: 1.6;
  }
</style>
</head>
<body>
<header class="header">
  <span class="header__brand">Docs browser</span>
  <span class="header__title"><!--DOCS_TITLE--></span>
</header>
<div class="layout">
  <nav class="tree-pane"><!--DOCS_TREE--></nav>
  <div class="content-pane">
    <article class="doc"><!--DOCS_CONTENT--></article>
  </div>
</div>
<script>
  // Localise the file-browser modified dates. The server renders a UTC
  // `YYYY-MM-DD HH:MM` fallback (shown if JS is off) plus a data-ts epoch-ms;
  // here we replace the text with the viewer's locale date.
  for (const el of document.querySelectorAll('time.browser__date[data-ts]')) {
    const ms = Number(el.getAttribute('data-ts'));
    if (!Number.isFinite(ms)) continue;
    const d = new Date(ms);
    el.dateTime = d.toISOString();
    el.textContent = d.toLocaleDateString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
    });
    el.title = d.toLocaleString();
  }
</script>
</body>
</html>
